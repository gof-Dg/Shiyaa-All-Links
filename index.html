<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiyaa | Telegram</title>
<style>
  :root {
    --card: rgba(30, 27, 38, 0.55);
    --accent: #29a9eb;
    --accent2: #1e88c7;
    --text: #f5f2ee;
    --muted: #c9c3d1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;

    background-image: url('IMG_20260714_185428.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(8,10,20,0.55), rgba(8,10,20,0.88));
    z-index: -1;
  }
  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%; right: -50%; bottom: -50%;
    background: radial-gradient(circle at 30% 20%, rgba(41,169,235,0.25), transparent 45%),
                radial-gradient(circle at 70% 80%, rgba(126,87,235,0.22), transparent 45%);
    z-index: -1;
    animation: drift 14s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(4%, 3%) rotate(8deg); }
  }
  .bottom-fade {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 40vh;
    background:
      repeating-linear-gradient(120deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 6px),
      linear-gradient(180deg, transparent, rgba(6,10,28,0.55) 40%, rgba(4,8,24,0.92) 100%);
    z-index: -1;
    pointer-events: none;
  }
  .page { width: 100%; max-width: 420px; text-align: center; animation: fadeIn 0.6s ease; perspective: 800px; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotateX(0deg); }
    50% { transform: translateY(-8px) rotateX(4deg); }
  }
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 0 auto 18px;
    background-image: url('background.jpeg');
    background-size: cover;
    background-position: center;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 40px rgba(41,169,235,0.35);
    animation: float 4.5s ease-in-out infinite;
    transform-style: preserve-3d;
  }
  h1 { font-size: 23px; margin: 0 0 6px; letter-spacing: 0.4px; font-weight: 700; }
  .platform-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    background: rgba(41,169,235,0.15);
    border: 1px solid rgba(41,169,235,0.35);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .platform-tag svg { width: 13px; height: 13px; }
  .links { display: flex; flex-direction: column; gap: 14px; }
  a.link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.25);
    border-top: 1px solid rgba(255,255,255,0.5);
    color: var(--text);
    text-decoration: none;
    padding: 16px 18px;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    transform-style: preserve-3d;
    overflow: hidden;
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.35),
      inset 0 -12px 20px -14px rgba(0,0,0,0.4),
      0 6px 20px rgba(0,0,0,0.35);
  }
  a.link::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.14), transparent);
    pointer-events: none;
  }
  a.link:hover, a.link:active {
    transform: translateY(-3px) rotateX(4deg) scale(1.015);
    border-color: var(--accent);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.4),
      inset 0 -12px 20px -14px rgba(0,0,0,0.4),
      0 14px 28px rgba(41,169,235,0.4);
  }
  a.link .icon {
    width: 42px;
    height: 42px;
    min-width: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: url('background.jpeg');
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
  }
  a.link .icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(10,10,20,0.35);
  }
  a.link .icon svg { width: 18px; height: 18px; fill: white; position: relative; z-index: 1; }
  a.link .label-group { display: flex; flex-direction: column; }
  a.link .label-group .main-label { font-size: 15px; font-weight: 600; }
  a.link .label-group .sub-label { font-size: 11px; color: var(--muted); margin-top: 1px; }
  a.link.featured {
    background: linear-gradient(135deg, rgba(41,169,235,0.25), rgba(30,136,199,0.25));
    border: 1px solid rgba(41,169,235,0.5);
  }
  footer { margin-top: 34px; font-size: 11px; color: var(--muted); letter-spacing: 0.3px; }

  /* Ripple effect inside links */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(3); opacity: 0; }
  }

  /* Water drop effect anywhere on page */
  .water-drop {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(140,200,255,0.55);
    box-shadow: 0 0 0 1px rgba(140,200,255,0.12) inset;
    transform: translate(-50%, -50%) scale(0);
    animation: dropAnim 1.8s cubic-bezier(0.15, 0.6, 0.35, 1) forwards;
    pointer-events: none;
    z-index: 999;
  }
  .water-drop.ring2 {
    animation-delay: 0.15s;
    border-color: rgba(140,200,255,0.32);
  }
  @keyframes dropAnim {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.85; filter: blur(0px); }
    35%  { opacity: 0.55; }
    70%  { opacity: 0.22; filter: blur(0.5px); }
    100% { transform: translate(-50%, -50%) scale(9); opacity: 0; filter: blur(1px); }
  }
</style>
</head>
<body>
  <div class="bottom-fade"></div>
  <div class="page">
    <div class="avatar"></div>
    <h1>Shiyaa</h1>
    <div class="platform-tag">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9.036 15.803l-.371 5.226c.531 0 .761-.229 1.037-.504l2.492-2.383 5.166 3.783c.947.522 1.622.247 1.874-.876L22.95 3.5c.353-1.428-.516-1.987-1.438-1.64L1.11 9.75c-1.396.545-1.378 1.328-.24 1.679l5.086 1.587L18.34 5.24c.557-.37 1.065-.166.647.204"/></svg>
      <span>Telegram Channel</span>
    </div>
    <div class="links">
      <a class="link featured" href="https://telegram.me/shiyaaoffic">
        <span class="icon"><svg viewBox="0 0 24 24"><path d="M9.036 15.803l-.371 5.226c.531 0 .761-.229 1.037-.504l2.492-2.383 5.166 3.783c.947.522 1.622.247 1.874-.876L22.95 3.5c.353-1.428-.516-1.987-1.438-1.64L1.11 9.75c-1.396.545-1.378 1.328-.24 1.679l5.086 1.587L18.34 5.24c.557-.37 1.065-.166.647.204"/></svg></span>
        <span class="label-group">
          <span class="main-label">Main Channel</span>
          <span class="sub-label">Join on Telegram</span>
        </span>
      </a>
      <a class="link" href="https://telegram.me/shiyaaba">
        <span class="icon"><svg viewBox="0 0 24 24"><path d="M9.036 15.803l-.371 5.226c.531 0 .761-.229 1.037-.504l2.492-2.383 5.166 3.783c.947.522 1.622.247 1.874-.876L22.95 3.5c.353-1.428-.516-1.987-1.438-1.64L1.11 9.75c-1.396.545-1.378 1.328-.24 1.679l5.086 1.587L18.34 5.24c.557-.37 1.065-.166.647.204"/></svg></span>
        <span class="label-group">
          <span class="main-label">Backup Channel</span>
          <span class="sub-label">Join on Telegram</span>
        </span>
      </a>
    </div>
    <footer>gof-dg.github.io</footer>
  </div>

  <script>
    // Water drop effect anywhere on the page
    document.addEventListener('pointerdown', function(e) {
      const drop1 = document.createElement('div');
      drop1.className = 'water-drop';
      drop1.style.left = e.clientX + 'px';
      drop1.style.top = e.clientY + 'px';
      document.body.appendChild(drop1);
      setTimeout(() => drop1.remove(), 1800);

      const drop2 = document.createElement('div');
      drop2.className = 'water-drop ring2';
      drop2.style.left = e.clientX + 'px';
      drop2.style.top = e.clientY + 'px';
      document.body.appendChild(drop2);
      setTimeout(() => drop2.remove(), 1950);
    });

    // Ripple effect inside each link button
    document.querySelectorAll('a.link').forEach(function(link) {
      link.addEventListener('pointerdown', function(e) {
        const rect = link.getBoundingClientRect();
        const ripple = document.createElement('span');
        const size = Math.max(rect.width, rect.height);
        ripple.className = 'ripple';
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        link.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
</body>
</html>
